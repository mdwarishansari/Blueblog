version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: blueblog-db
    environment:
      POSTGRES_USER: blueblog
      POSTGRES_PASSWORD: blueblog123
      POSTGRES_DB: blueblog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - blueblog-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blueblog"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: blueblog-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://blueblog:blueblog123@postgres:5432/blueblog?schema=public
      PORT: 4000
      JWT_ACCESS_SECRET: dev_access_secret_change_in_production
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_production
      ALLOWED_ORIGINS: http://localhost:3000
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    ports:
      - "4000:4000"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - blueblog-network
    command: >
      sh -c "
      npx prisma migrate deploy &&
      npx prisma db seed &&
      npm run dev
      "
    restart: unless-stopped

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: blueblog-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@blueblog.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - blueblog-network
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  blueblog-network:
    driver: bridge